<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisis Agent - Web Console</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0d0f12;
            --bg-sidebar: #16181d;
            --accent-main: #64748b; 
            --text-main: #cbd5e1;
            --text-dim: #64748b;
            --bg-thought: #1e293b;
            --border: #1e293b;
            --bg-code: #0f172a;

            /* Industry Standard File Colors */
            --file-pdf: #ef4444;
            --file-doc: #3b82f6;
            --file-xls: #22c55e;
            --file-ppt: #f97316;
            --file-code: #f59e0b;
            --file-zip: #a855f7;
            --file-media: #ec4899;
            --file-default: #94a3b8;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 0; 
            transition: background 0.3s;
        }
        *:hover::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-main) !important; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        #app { display: flex; height: 100%; position: relative; z-index: 1; }

        #sidebar {
            width: 260px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }

        .brand { font-size: 1.2rem; font-weight: 600; color: var(--accent-main); margin-bottom: 20px; letter-spacing: 2px; }

        .stats-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); 
            padding: 12px 15px; 
            margin-bottom: 15px;
        }
        .stats-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--accent-main);
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-title svg { opacity: 0.7; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-item { 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-label { 
            font-size: 0.6rem; 
            color: var(--text-dim); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value { 
            font-size: 0.85rem;
            color: var(--text-main); 
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-full { grid-column: span 2; }

        .model-box {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            margin-top: 8px;
            border-left: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .model-box:hover { border-color: var(--accent-main); }
        .model-tag { font-size: 0.6rem; color: var(--accent-main); font-weight: bold; }
        .model-address { font-size: 0.7rem; color: var(--text-dim); font-weight: 500; }

        #skill-manager {
            margin-top: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
        }
        #skill-list {
            flex: 1;
            overflow-y: auto;
        }
        .skill-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .skill-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .skill-name { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
            margin-right: 8px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e293b;
            transition: .4s; border-radius: 0;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: #64748b;
            transition: .4s; border-radius: 0;
        }
        input:checked + .slider { background-color: var(--accent-main); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }

        .action-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 0;
            cursor: pointer; text-align: left; margin-bottom: 10px;
            transition: all 0.2s; font-size: 0.9rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
        }
        .action-btn:hover { background: var(--border); border-color: var(--accent-main); color: var(--accent-main); }

        #main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            position: relative;
            overflow: hidden; 
        }
        #chat-history { 
            flex: 1; 
            width: 100%; 
            overflow-y: auto; 
            scroll-behavior: smooth;
            padding: 40px 0;
            scrollbar-gutter: stable;
        }
        .message-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .message { margin-bottom: 30px; display: flex; flex-direction: column; }
        .role-user { align-items: flex-start; }
        .role-assistant { align-items: flex-end; }

        .role-tag { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .role-user .role-tag { color: #94a3b8; }
        .role-user .content {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px 18px;
            display: inline-block;
            max-width: 85%;
            border-radius: 0;
        }
        .role-assistant .role-tag { color: var(--accent-main); text-align: right; }
        .role-assistant .content {
            background: rgba(100, 116, 139, 0.05);
            border: 1px solid var(--border);
            padding: 12px 18px;
            display: inline-block;
            width: 90%;
            border-radius: 0;
            text-align: left;
            box-sizing: border-box;
        }
        
        .thought-block { 
            background: var(--bg-thought); 
            border-left: 2px solid var(--accent-main); 
            padding: 15px; 
            margin: 10px 0; 
            color: var(--text-dim); 
            font-size: 0.9rem; 
            white-space: pre-wrap; 
            border-radius: 0; 
            opacity: 0.7;
            width: 90%;
            box-sizing: border-box;
        }
        .role-assistant .thought-block { border-left: none; border-right: 2px solid var(--accent-main); text-align: left; }
        
        .role-tool { border-left: 2px solid #334155; padding-left: 15px; margin: 15px 0; }
        .role-tool .role-tag { color: #475569; font-size: 0.6rem; }
        .role-tool .content { font-family: monospace; font-size: 0.85rem; color: #64748b; }

        .content { line-height: 1.6; font-size: 0.9rem; }
        .content:empty { display: none; }
        .content p { margin: 0 0 1em 0; }
        .content h1, .content h2, .content h3 { font-size: 1.05rem; margin: 1.2em 0 0.6em 0; color: var(--accent-main); }
        .content h4, .content h5, .content h6 { font-size: 0.95rem; margin: 1em 0 0.5em 0; }
        .content code { background: var(--bg-code); padding: 2px 5px; border-radius: 0; font-family: monospace; font-size: 0.9em; }
        .content a { 
            color: #60a5fa; 
            text-decoration: none; 
            border-bottom: 1px solid rgba(96, 165, 250, 0.2); 
            transition: all 0.2s ease;
            word-break: break-all;
        }
        .content a:hover { 
            color: #93c5fd;
            border-bottom-color: #93c5fd;
            background: rgba(96, 165, 250, 0.05);
        }        
        .code-container {
            background: var(--bg-code);
            border-radius: 0;
            margin: 15px 0;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .code-header {
            background: rgba(255,255,255,0.01);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .copy-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 2px 8px; border-radius: 0;
            cursor: pointer; font-size: 0.7rem; transition: all 0.2s;
        }
        .copy-btn:hover { color: var(--accent-main); border-color: var(--accent-main); }
        .content pre { margin: 0; padding: 15px; border: none; }
        .content pre code { background: transparent; padding: 0; }

        .content table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 0.9rem; border: 1px solid var(--border); }
        .content th, .content td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        .content th { background: rgba(255,255,255,0.01); }
        .content ul, .content ol { padding-left: 20px; margin-bottom: 1em; }

        /* 合并后的日志样式 */
        .log-wrapper {
            margin: 15px 0 15px auto;
            border: 1px solid var(--border);
            border-radius: 0;
            overflow: hidden;
            background: rgba(255,255,255,0.01);
            width: 90%;
            min-width: 300px;
            box-sizing: border-box;
        }
        .log-header {
            padding: 8px 15px;
            background: rgba(255,255,255,0.02);
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-dim);
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .log-header:hover { background: rgba(255,255,255,0.05); color: var(--accent-main); }
        .log-toggle { font-size: 0.6rem; width: 12px; color: var(--accent-main); }
        .log-status { margin-left: auto; display: flex; align-items: center; }
        .spinner-micro {
            width: 8px; height: 8px;
            border: 2px solid rgba(100, 116, 139, 0.2);
            border-top-color: var(--accent-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .log-content {
            padding: 15px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.8rem;
            color: #64748b;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            background: rgba(0,0,0,0.1);
        }

        .log-line { font-family: monospace; font-size: 0.8rem; color: #475569; margin: 4px 0; padding-left: 10px; border-left: 1px solid #1e293b; white-space: pre-wrap; }
        .log-stream-container { font-family: monospace; font-size: 0.8rem; color: #64748b; margin: 4px 0; padding-left: 10px; border-left: 1px solid var(--accent-main); white-space: pre-wrap; }

        .captured-image {
            max-width: 240px; max-height: 240px; width: auto; height: auto; border-radius: 0; margin: 10px 0; border: 1px solid var(--border); cursor: zoom-in; transition: transform 0.2s; object-fit: contain;
        }
        .captured-image:hover { transform: scale(1.01); }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13,15,18,0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; cursor: zoom-out;
        }
        #lightbox img { max-width: 95%; max-height: 95%; border: 2px solid var(--border); border-radius: 0; }

        #input-container { 
            padding: 20px; 
            background: var(--bg-dark);
            z-index: 100;
            width: 100%;
            box-sizing: border-box;
        }
        .input-wrapper-outer {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        .input-wrapper { background: #16181d; border-radius: 0; padding: 10px 15px; display: flex; border: 1px solid var(--border); align-items: center; gap: 10px; }
        #prompt-input { background: transparent; border: none; color: var(--text-main); flex: 1; outline: none; font-size: 1rem; padding: 0 10px; }
        
        .think-toggle-container {
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-dim);
            padding-right: 10px; border-right: 1px solid var(--border);
        }

        #send-btn { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 0; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        #send-btn.stop { background: #7f1d1d; }
        
        .upload-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; padding: 5px; transition: color 0.2s; display: flex; align-items: center; }
        .upload-btn:hover { color: var(--accent-main); }
        
        #image-preview-container {
            display: none; padding: 12px 20px; background: rgba(255,255,255,0.01);
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            position: relative; align-items: center; gap: 15px;
        }
        #image-preview { width: 64px; height: 64px; border-radius: 0; border: 1px solid var(--border); object-fit: cover; }
        #file-icon { 
            width: 64px; height: 64px; 
            display: flex; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.02); border-radius: 0; 
            border: 1px solid var(--border);
        }
        #file-icon svg { width: 32px; height: 32px; stroke-width: 1.5px; }
        #file-meta { font-size: 0.85rem; color: var(--text-dim); font-family: 'Inter', sans-serif; }
        
        .remove-img { 
            position: absolute; top: -8px; right: -8px; background: #1e293b; color: #94a3b8; 
            border-radius: 0; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: none !important; z-index: 10; padding: 0;
        }
        .remove-img:hover { background: #7f1d1d; color: white; }
        .remove-img svg { pointer-events: none; }

        #reboot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 15, 18, 0.98);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; backdrop-filter: blur(5px);
        }
        .loader {
            width: 50px; height: 50px;
            border: 3px solid #1e293b; border-top: 3px solid var(--accent-main);
            border-radius: 0; animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .reboot-text { color: var(--accent-main); font-size: 1rem; font-weight: 500; letter-spacing: 4px; }
        #reboot-timer { color: rgba(255,255,255,0.1); font-family: 'JetBrains Mono', monospace; margin-top: 10px; font-size: 0.8rem; letter-spacing: 2px; }

        #drop-zone {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            box-sizing: border-box !important;
            background: rgba(13, 15, 18, 0.95) !important;
            border: 2px dashed #334155 !important;
            display: flex !important; justify-content: center !important; align-items: center !important;
            z-index: 2147483647 !important; pointer-events: none !important;
            backdrop-filter: blur(4px) !important;
            opacity: 0 !important; visibility: hidden !important;
            transition: opacity 0.15s;
        }
        #drop-zone.active { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; }
        .drop-text { color: #475569; font-weight: 300; font-size: 2.2rem; letter-spacing: 2px; font-family: 'Inter', sans-serif; }

        /* Suggestions Box */
        #suggestions {
            position: absolute; bottom: 85px; left: 0; right: 0;
            background: var(--bg-sidebar); border: 1px solid var(--border);
            border-radius: 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            display: none; z-index: 1000; max-height: 300px; overflow-y: auto;
        }
        .suggestion-item {
            padding: 12px 15px; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .suggestion-item.active { background: #1e293b !important; }
        .suggestion-item.active .cmd-name { color: var(--accent-main); }
        .suggestion-item .cmd-name { font-weight: 600; font-family: monospace; color: var(--text-main); }
        .suggestion-item .cmd-desc { font-size: 0.8rem; color: var(--text-dim); opacity: 0.8; }

        /* 全能预览窗口样式 */
        #preview-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 15, 18, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 5000; backdrop-filter: blur(10px);
        }
        #preview-window {
            width: 90%; height: 85%; max-width: 1200px;
            background: var(--bg-sidebar); border: 1px solid var(--border);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #preview-header {
            padding: 12px 20px; background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        #preview-title { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        #preview-body { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: center; background: #000; }
        #preview-body pre { width: 100%; height: 100%; margin: 0; background: transparent; border: none; font-size: 0.9rem; }
        
        .preview-close { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; }
        .preview-close:hover { color: var(--file-pdf); }

        .preview-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: var(--text-main); padding: 4px 10px; font-size: 0.7rem; 
            cursor: pointer; transition: all 0.2s;
        }
        .preview-btn:hover { background: var(--accent-main); color: white; }

        /* Media Speed Controller Styles */
        .speed-controller {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            height: 28px;
        }
        .speed-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 0 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            height: 100%;
        }
        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }
        .speed-btn:active {
            background: var(--accent-main);
            color: white;
        }
        .speed-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-main);
            padding: 0 10px;
            min-width: 45px;
            text-align: center;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }
        .speed-value:hover {
            background: rgba(100, 116, 139, 0.1);
            color: #fff;
        }
        .speed-btn svg { width: 14px; height: 14px; }

        /* 链接旁的预览按钮 */
        .quick-preview-trigger {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; margin-left: 8px;
            background: rgba(96, 165, 250, 0.1); color: #60a5fa;
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
            vertical-align: middle; border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .quick-preview-trigger:hover { background: #60a5fa; color: white; transform: scale(1.1); }
        .quick-preview-trigger svg { width: 12px; height: 12px; stroke-width: 2.5px; }

        /* Runnable Code Block Styles */
        .code-console {
            background: #000;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #10b981;
            display: none;
            position: relative;
        }
        .code-console.active { display: block; }
        .code-console.error { color: #ef4444; }
        .console-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 15px; background: #0a0a0a; border-bottom: 1px solid #1e293b;
            font-size: 0.65rem; color: #64748b; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .console-output {
            padding: 10px 15px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .console-output.folded { display: none; }
        .run-btn {
            background: #10b981; border: none; color: white;
            padding: 2px 10px; border-radius: 2px; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; margin-right: 8px;
            transition: all 0.2s;
        }
        .run-btn:hover { background: #059669; }
        .run-btn.stop { background: #ef4444; }
        .run-btn.stop:hover { background: #dc2626; }
        .console-close {
            position: absolute; top: 5px; right: 10px;
            cursor: pointer; color: #64748b; font-size: 0.8rem;
        }
        .console-close:hover { color: white; }
    </style>
</head>
<body>
    <div id="drop-zone"><div class="drop-text">DROP TO UPLOAD</div></div>
    <div id="reboot-overlay">
        <div class="loader"></div>
        <div class="reboot-text">SYSTEM REBOOTING</div>

    <div id="app">
        <div id="sidebar">

                <svg width="180" height="32" viewBox="0 0 180 32" fill="none" xmlns="http://www.w3.org/2000/svg">

                        <!-- S (修正粗细) -->
                        <path d="M54 4H42V18H50V24H42V28H54V14H46V8H54V4Z"/>
                        <!-- I -->
                        <path d="M58 4H62V28H58V4Z"/>
                        <!-- S (修正粗细) -->

                        <!-- AGENT -->

            </div>
            <div class="stats-card" id="connection-stats">
                <div class="stats-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                    System Status
                </div>
                <div class="stat-grid">
                    <div class="stat-item">
                        <span class="stat-label">Address</span>

                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Port</span>
                        <span id="conn-port" class="stat-value">...</span>
                    </div>
                    <div class="stat-item stat-full">
                        <span class="stat-label">Uptime</span>
                        <span id="conn-uptime" class="stat-value">0s</span>
                    </div>
                </div>
            </div>

            <div class="stats-card">
                <div class="stats-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                    AI Architecture
                </div>
                <div class="model-box">
                    <span class="model-tag">CLI</span>
                    <span id="cli-model" class="model-address">...</span>
                </div>
                <div class="model-box">
                    <span class="model-tag">EXEC</span>
                    <span id="exec-model" class="model-address">...</span>
                </div>
                
                <div style="border-top: 1px solid var(--border); margin: 15px 0 12px 0;"></div>
                
                <div class="stat-grid">
                    <div class="stat-item stat-full">
                        <span class="stat-label">Total Tokens</span>
                        <span id="total-tokens" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Prompt</span>
                        <span id="prompt-tokens" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Response</span>
                        <span id="response-tokens" class="stat-value">0</span>
                    </div>
                </div>
            </div>
            <button class="action-btn" onclick="sendCommand('/reset')">🔄 Reset Session</button>
            <button class="action-btn" onclick="sendCommand('/reboot')">🔌 Reboot System</button>
            <div id="skill-manager">
                <div class="skill-section-title">System Skills</div>
                <div id="skill-list"></div>
            </div>
        </div>
        <div id="main">
            <div id="chat-history"></div>
            <div id="image-preview-container">
                <div id="preview-box" style="position: relative;">
                    <img id="image-preview" src="" style="display:none;">
                    <div id="file-icon" style="display:none;">📄</div>
                    <button class="remove-img" onclick="clearFile()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                    <span id="file-meta">File attached</span>
                    <div id="upload-progress-container" style="display:none; width: 100%; height: 4px; background: #1e293b; margin: 4px 0;">
                        <div id="upload-progress-bar" style="width: 0%; height: 100%; background: var(--accent-main); transition: width 0.1s;"></div>
                    </div>
                    <button id="push-btn" onclick="pushFileToServer()" style="width: fit-content; background: transparent; border: 1px solid var(--border); color: var(--accent-main); font-size: 0.7rem; padding: 2px 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Push to Server</button>
                </div>
            </div>
            <div id="input-container">
                <div class="input-wrapper-outer">
                    <div id="suggestions"></div>
                    <div class="input-wrapper">
                        <input type="file" id="file-input" style="display: none;" onchange="handleFile(this)">
                        <button class="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload File">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <input type="text" id="prompt-input" placeholder="Type / for commands..." autocomplete="off">
                        <div class="think-toggle-container">
                            <span>Think</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="cli-think-toggle" onchange="toggleConfig('cli_think', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img src="" alt="Preview"></div>

    <!-- 全能预览窗口 -->
    <div id="preview-overlay">
        <div id="preview-window">
            <div id="preview-header">
                <span id="preview-title">File Preview</span>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div id="media-controls" style="display: none;">
                        <div class="speed-controller">
                            <button class="speed-btn" onclick="adjustSpeed(-0.25)" title="Slower"><i data-lucide="minus"></i></button>
                            <div class="speed-value" id="current-speed" onclick="adjustSpeed(0)" title="Click to Reset">1.0x</div>
                            <button class="speed-btn" onclick="adjustSpeed(0.25)" title="Faster"><i data-lucide="plus"></i></button>
                        </div>
                    </div>
                    <div id="image-controls" style="display: none; gap: 10px; align-items: center;">
                        <button class="preview-btn" onclick="adjustZoom(1.2)">🔍 +</button>
                        <button class="preview-btn" onclick="adjustZoom(0.8)">🔍 -</button>
                        <button class="preview-btn" onclick="resetImageTransform()">Reset</button>
                        <span id="zoom-level" style="font-size: 0.75rem; color: var(--accent-main); min-width: 40px; text-align: center;">100%</span>
                    </div>
                    <button class="preview-close" onclick="closePreview()">✕</button>
                </div>
            </div>
            <div id="preview-body" style="overflow: hidden;">
                <!-- 动态内容区域 -->
                <pre id="code-preview" style="display: none; overflow: auto; width: 100%; height: 100%;"><code class="hljs"></code></pre>
                <div id="image-viewport" style="display: none; width: 100%; height: 100%; cursor: grab; overflow: hidden; position: relative;">
                    <img id="image-preview-full" style="max-width: 100%; max-height: 100%; object-fit: contain; position: absolute; transition: transform 0.1s ease-out; pointer-events: none;">
                </div>
                <iframe id="pdf-preview" style="display: none; width: 100%; height: 100%; border: none;"></iframe>
                <video id="video-preview" controls style="display: none; width: 100%; max-height: 100%;"></video>
                <audio id="audio-preview" controls style="display: none; width: 80%;"></audio>
                <div id="preview-loader" style="display: none;"><div class="spinner-micro" style="width: 20px; height: 20px;"></div></div>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const promptInput = document.getElementById('prompt-input');
        const suggestionsBox = document.getElementById('suggestions');
        const skillList = document.getElementById('skill-list');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');
        const rebootOverlay = document.getElementById('reboot-overlay');
        const rebootTimer = document.getElementById('reboot-timer');

        function openLightbox(src) { lightboxImg.src = src; lightbox.style.display = 'flex'; }

        async function fetchSkills() {
            try {
                const res = await fetch('/api/skills');
                const data = await res.json();
                renderSkills(data.skills);
            } catch (e) { console.error('Failed to load skills'); }
        }

        function renderSkills(skills) {
            skillList.innerHTML = '';
            skills.forEach(skill => {
                const div = document.createElement('div');
                div.className = 'skill-item';
                const isEnabled = skill.enabled !== false;
                div.innerHTML = `<span class="skill-name" title="${skill.description}">${skill.name}</span><label class="toggle-switch"><input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleSkill('${skill.name}', this.checked)"><span class="slider"></span></label>`;
                skillList.appendChild(div);
            });
        }

        async function toggleSkill(name, status) {
            try { await fetch('/api/set_skill', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, enabled: status }) }); } catch (e) {}
        }

        function toggleConfig(key, status) {
            if (key === 'cli_think') {
                sendCommand(`/set cli_think ${status ? 'on' : 'off'}`);
            }
        }

        const COMMANDS = [
            { name: '/help', desc: 'Show all commands' },
            { name: '/clear', desc: 'Clear screen' },
            { name: '/reset', desc: 'Reset history & tokens' },
            { name: '/context', desc: 'View context' },
            { name: '/system', desc: 'View system prompt' },
            { name: '/skill_debug', desc: 'Debug routing' },
            { name: '/list skills', desc: 'List skills' },
            { name: '/list mcp functions', desc: 'List MCP tools' },
            { name: '/reboot', desc: 'Restart system' },
            { name: '/set cli_think on', desc: 'Enable CLI CoT' },
            { name: '/set cli_think off', desc: 'Disable CLI CoT' },
            { name: '/set exec_think on', desc: 'Enable Executor CoT' },
            { name: '/set exec_think off', desc: 'Disable Executor CoT' },
            { name: '/exit', desc: 'Quit app' }
        ];

        let selectedIndex = -1;
        let filteredCommands = [];

        function renderSuggestions() {
            const val = promptInput.value;
            if (!val.startsWith('/')) { suggestionsBox.style.display = 'none'; return; }
            filteredCommands = COMMANDS.filter(c => c.name.startsWith(val));
            if (filteredCommands.length === 0) { suggestionsBox.style.display = 'none'; return; }
            suggestionsBox.innerHTML = '';
            filteredCommands.forEach((cmd, i) => {
                const item = document.createElement('div');
                item.className = 'suggestion-item' + (i === selectedIndex ? ' active' : '');
                item.innerHTML = `<span class="cmd-name">${cmd.name}</span><span class="cmd-desc">${cmd.desc}</span>`;
                item.onclick = () => { promptInput.value = cmd.name; suggestionsBox.style.display = 'none'; promptInput.focus(); };
                suggestionsBox.appendChild(item);
                if (i === selectedIndex) item.scrollIntoView({ block: 'nearest' });
            });
            suggestionsBox.style.display = 'block';
        }

        promptInput.oninput = () => { selectedIndex = -1; renderSuggestions(); };
        promptInput.onkeydown = (e) => {
            if (suggestionsBox.style.display === 'block') {
                if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = (selectedIndex + 1) % filteredCommands.length; renderSuggestions(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = (selectedIndex - 1 + filteredCommands.length) % filteredCommands.length; renderSuggestions(); }
                else if (e.key === 'Enter') { 
                    if (selectedIndex >= 0) { e.preventDefault(); promptInput.value = filteredCommands[selectedIndex].name; suggestionsBox.style.display = 'none'; }
                    else { send(); }
                } else if (e.key === 'Escape') { suggestionsBox.style.display = 'none'; }
            } else if (e.key === 'Enter') { send(); }
        };

        const renderer = new marked.Renderer();
        
        // 增强链接渲染，添加预览按钮
        renderer.link = function(args) {
            const href = typeof args === 'object' ? args.href : args;
            const text = typeof args === 'object' ? args.text : arguments[1];
            return `<a href="${href}" target="_blank">${text}</a><span class="quick-preview-trigger" onclick="openPreview('${href}')" title="Quick Preview"><i data-lucide="eye"></i></span>`;
        };

        renderer.code = function(args) {
            const code = typeof args === 'object' ? args.text : args;
            const lang = (typeof args === 'object' ? args.lang : arguments[1]) || 'plaintext';
            const scriptId = 'script_' + Math.random().toString(36).substr(2, 9);
            let highlighted;
            try { highlighted = (lang && hljs.getLanguage(lang)) ? hljs.highlight(code, { language: lang }).value : hljs.highlightAuto(code).value; } catch (e) { highlighted = code; }
            
            const isRunnable = lang.toLowerCase() === 'javascript' || lang.toLowerCase() === 'js';
            const runBtn = isRunnable ? `<button class="run-btn" id="run_${scriptId}" onclick="runJSCode('${scriptId}')">Run</button>` : '';
            
            return `<div class="code-container" id="container_${scriptId}">
                <div class="code-header">
                    <span>${lang}</span>
                    <div>
                        ${runBtn}
                        <button class="copy-btn" onclick="copyToClipboard(this)">Copy</button>
                    </div>
                </div>
                <pre><code class="hljs language-${lang}" ${isRunnable ? 'contenteditable="true" spellcheck="false"' : ''} id="code_${scriptId}">${highlighted}</code></pre>
                <div class="code-console" id="console_${scriptId}">
                    <div class="console-header">
                        <span>Console Output</span>
                        <span class="console-fold" onclick="toggleJSConsole('${scriptId}')" style="cursor:pointer;" id="fold_${scriptId}">▼</span>
                    </div>
                    <div class="console-output"></div>
                </div>
            </div>`;
        };
        marked.setOptions({ renderer });

        // 预览系统逻辑
        const previewOverlay = document.getElementById('preview-overlay');
        const codePreview = document.getElementById('code-preview');
        const videoPreview = document.getElementById('video-preview');
        const audioPreview = document.getElementById('audio-preview');
        const pdfPreview = document.getElementById('pdf-preview');
        const imageViewport = document.getElementById('image-viewport');
        const imagePreviewFull = document.getElementById('image-preview-full');
        const previewLoader = document.getElementById('preview-loader');
        const previewTitle = document.getElementById('preview-title');
        const mediaControls = document.getElementById('media-controls');
        const imageControls = document.getElementById('image-controls');
        const currentSpeedEl = document.getElementById('current-speed');
        const zoomLevelEl = document.getElementById('zoom-level');

        let imgScale = 1;
        let imgOffsetX = 0;
        let imgOffsetY = 0;
        let isDraggingImg = false;
        let startX, startY;

        async function openPreview(url) {
            let pathPart = url;
            let previewUrl = url;
            
            try {
                const urlObj = new URL(url, window.location.origin);
                if (urlObj.pathname.includes('/download')) {
                    pathPart = urlObj.searchParams.get('path') || '';
                    // 核心修复：为预览请求添加 view=1 参数，防止强制下载
                    urlObj.searchParams.set('view', '1');
                    previewUrl = urlObj.toString();
                }
                else pathPart = urlObj.pathname;
            } catch(e) {}
            
            const ext = pathPart.split('.').pop().toLowerCase();
            previewOverlay.style.display = 'flex';
            previewLoader.style.display = 'block';
            codePreview.style.display = 'none';
            videoPreview.style.display = 'none';
            audioPreview.style.display = 'none';
            pdfPreview.style.display = 'none';
            imageViewport.style.display = 'none';
            mediaControls.style.display = 'none';
            imageControls.style.display = 'none';
            previewTitle.innerText = `Previewing: ${pathPart.split(/[\\/]/).pop()}`;

            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);
            const isVideo = ['mp4', 'webm', 'ogg', 'mov'].includes(ext);
            const isAudio = ['mp3', 'wav', 'aac', 'flac'].includes(ext);
            const isPDF = ext === 'pdf';

            if (isImage) {
                resetImageTransform();
                imagePreviewFull.src = previewUrl;
                imageViewport.style.display = 'flex';
                imageViewport.style.justifyContent = 'center';
                imageViewport.style.alignItems = 'center';
                imageControls.style.display = 'flex';
                previewLoader.style.display = 'none';
            } else if (isPDF) {
                pdfPreview.src = previewUrl;
                pdfPreview.style.display = 'block';
                previewLoader.style.display = 'none';
            } else if (isVideo) {
                videoPreview.src = previewUrl; videoPreview.style.display = 'block';
                mediaControls.style.display = 'flex'; previewLoader.style.display = 'none';
                videoPreview.play();
            } else if (isAudio) {
                audioPreview.src = previewUrl; audioPreview.style.display = 'block';
                mediaControls.style.display = 'flex'; previewLoader.style.display = 'none';
                audioPreview.play();
            } else {
                try {
                    const res = await fetch(previewUrl);
                    const text = await res.text();
                    codePreview.querySelector('code').textContent = text;
                    codePreview.style.display = 'block';
                    hljs.highlightElement(codePreview.querySelector('code'));
                } catch (e) {
                    codePreview.querySelector('code').textContent = `Unable to preview content: ${e.message}`;
                    codePreview.style.display = 'block';
                }
                previewLoader.style.display = 'none';
            }
            lucide.createIcons();
        }

        // 图片变换逻辑
        function updateImageTransform() {
            imagePreviewFull.style.transform = `translate(${imgOffsetX}px, ${imgOffsetY}px) scale(${imgScale})`;
            zoomLevelEl.innerText = `${Math.round(imgScale * 100)}%`;
        }

        function resetImageTransform() {
            imgScale = 1; imgOffsetX = 0; imgOffsetY = 0;
            updateImageTransform();
        }

        function adjustZoom(factor) {
            imgScale *= factor;
            imgScale = Math.max(0.1, Math.min(10, imgScale));
            updateImageTransform();
        }

        imageViewport.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            adjustZoom(delta);
        };

        imageViewport.onmousedown = (e) => {
            isDraggingImg = true;
            imageViewport.style.cursor = 'grabbing';
            startX = e.clientX - imgOffsetX;
            startY = e.clientY - imgOffsetY;
        };

        window.onmousemove = (e) => {
            if (!isDraggingImg) return;
            imgOffsetX = e.clientX - startX;
            imgOffsetY = e.clientY - startY;
            updateImageTransform();
        };

        window.onmouseup = () => {
            isDraggingImg = false;
            imageViewport.style.cursor = 'grab';
        };

        function closePreview() {
            previewOverlay.style.display = 'none';
            videoPreview.pause(); videoPreview.src = "";
            audioPreview.pause(); audioPreview.src = "";
            resetImageTransform();
        }

        function adjustSpeed(delta) {
            const media = videoPreview.style.display !== 'none' ? videoPreview : audioPreview;
            if (!media) return;

            let newSpeed;
            if (delta === 0) {
                newSpeed = 1.0;
            } else {
                newSpeed = Math.max(0.25, Math.min(4, media.playbackRate + delta));
            }
            
            media.playbackRate = newSpeed;
            currentSpeedEl.innerText = `${newSpeed.toFixed(2)}x`;
            
            // Highlight reset if not 1.0
            if (newSpeed !== 1.0) {
                currentSpeedEl.style.color = '#fff';
            } else {
                currentSpeedEl.style.color = 'var(--accent-main)';
            }
        }

        // 点击遮罩关闭
        previewOverlay.onclick = (e) => { if (e.target === previewOverlay) closePreview(); };

        function copyToClipboard(btn) {
            const code = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerText; btn.innerText = 'Copied!'; btn.style.color = 'var(--accent-main)';
                setTimeout(() => { btn.innerText = originalText; btn.style.color = ''; }, 2000);
            });
        }

        function showRebootOverlay() {
            if (localStorage.getItem('reboot_start')) return;
            localStorage.setItem('reboot_start', Date.now().toString());
            updateRebootTimer();
            rebootOverlay.style.display = 'flex';
            setTimeout(() => location.reload(), 6000);
        }

        let rebootInterval;
        function updateRebootTimer() {
            const start = parseInt(localStorage.getItem('reboot_start') || Date.now());
            rebootOverlay.style.display = 'flex';
            if (rebootInterval) clearInterval(rebootInterval);
            rebootInterval = setInterval(() => { const elapsed = ((Date.now() - start) / 1000).toFixed(1); rebootTimer.innerText = `ELAPSED: ${elapsed}s`; }, 100);
        }

        if (localStorage.getItem('reboot_start')) { localStorage.removeItem('reboot_start'); rebootOverlay.style.display = 'none'; }

        let socket;
        let last_div = null;
        let currentAssistantMsg = null;
        let currentRawContent = "";
        let reconnectTimer = null;
        let connectionStartTime = null;
        let uptimeInterval = null;
        let logTimerId = null;

        function updateUptime() {
            if (!connectionStartTime) return;
            const elapsed = Math.floor((Date.now() - connectionStartTime) / 1000);
            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60);
            const s = elapsed % 60;
            document.getElementById('conn-uptime').innerText = `${h > 0 ? h + 'h ' : ''}${m > 0 ? m + 'm ' : ''}${s}s`;
        }

        function connect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            
            socket = new WebSocket(`ws://${window.location.host}`);
            
            socket.onopen = () => { 
                console.log("WebSocket connected");
                connectionStartTime = Date.now();
                if (uptimeInterval) clearInterval(uptimeInterval);
                uptimeInterval = setInterval(updateUptime, 1000);

                document.getElementById('conn-ip').innerText = window.location.hostname;
                document.getElementById('conn-port').innerText = window.location.port || '80';

                fetchSkills(); 
                // 如果当前有重启遮罩，连接成功后移除它
                if (localStorage.getItem('reboot_start')) {
                    localStorage.removeItem('reboot_start');
                    rebootOverlay.style.display = 'none';
                    if (rebootInterval) clearInterval(rebootInterval);
                }
            };

            socket.onclose = () => { 
                console.log("WebSocket closed. Retrying in 2s...");
                connectionStartTime = null;
                if (uptimeInterval) clearInterval(uptimeInterval);
                // 只要连接断开，就启动重连定时器
                if (!reconnectTimer) {
                    reconnectTimer = setTimeout(connect, 2000);
                }
            };

            socket.onerror = (err) => { 
                console.error("WebSocket error:", err);
                socket.close(); 
            };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'history') { chatHistory.innerHTML = ''; data.history.forEach(appendMessage); }
                else if (data.type === 'clear') { chatHistory.innerHTML = ''; last_div = null; }
                else if (data.type === 'reboot') { showRebootOverlay(); }
                else if (data.type === 'config') {
                    const cliToggle = document.getElementById('cli-think-toggle');
                    if (cliToggle) cliToggle.checked = data.cli_think;
                    
                    if (data.cli_model) document.getElementById('cli-model').innerText = data.cli_model;
                    if (data.exec_model) document.getElementById('exec-model').innerText = data.exec_model;
                    if (data.tokens) {
                        document.getElementById('total-tokens').innerText = data.tokens.total || 0;
                        document.getElementById('prompt-tokens').innerText = data.tokens.prompt || 0;
                        document.getElementById('response-tokens').innerText = data.tokens.response || 0;
                    }
                }
                else if (data.type === 'console_log' || data.type === 'console_log_stream') {
                    const isStream = data.type === 'console_log_stream';
                    const cleanText = data.content.replace(/\x1b\[[0-9;]*m/g, '');
                    if (!cleanText.trim()) return;

                    // 处理加粗和转义的辅助函数
                    const processLogText = (txt) => {
                        const escaped = txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        // 匹配 [Tool Result] 及其后的所有内容并加粗
                        return escaped.replace(/(\[Tool Result\].*)/g, '<strong style="color:var(--accent-main);filter:brightness(1.2);">$1</strong>');
                    };

                    // 检查上一个元素是否是日志容器
                    if (last_div && last_div.querySelector('.log-wrapper')) {
                        const content = last_div.querySelector('.log-content');
                        const status = last_div.querySelector('.log-status');
                        
                        // 显示 loading
                        if (status) status.innerHTML = '<div class="spinner-micro"></div>';
                        
                        if (data.type === 'console_log' && content.innerHTML.length > 0) {
                            content.innerHTML += '\n';
                        }
                        
                        content.innerHTML += processLogText(cleanText);
                        last_div.dataset.lastLogType = data.type;
                    } else {
                        const container = document.createElement('div');
                        container.className = 'message-container';

                        const wrapper = document.createElement('div');
                        wrapper.className = 'log-wrapper';

                        const header = document.createElement('div');
                        header.className = 'log-header';
                        // 强制默认折叠
                        const defaultCollapsed = true;
                        header.innerHTML = `<span class="log-toggle">▶</span> <span class="log-label">Executor output</span> <span class="log-duration" style="margin-left: 8px; opacity: 0.6; font-size: 0.7rem; font-weight: normal;">(0.0s)</span> <div class="log-status"><div class="spinner-micro"></div></div>`;

                        const content = document.createElement('div');
                        content.className = 'log-content';
                        content.style.display = 'none'; // 初始折叠
                        content.innerHTML = processLogText(cleanText);

                        header.onclick = () => {
                            const isHidden = content.style.display === 'none';
                            content.style.display = isHidden ? 'block' : 'none';
                            header.querySelector('.log-toggle').innerText = isHidden ? '▼' : '▶';
                        };

                        wrapper.appendChild(header);
                        wrapper.appendChild(content);
                        container.appendChild(wrapper);
                        chatHistory.appendChild(container);
                        
                        last_div = container;
                        last_div.dataset.lastLogType = data.type;
                        last_div.dataset.logStart = Date.now();

                        // 启动计时器
                        if (logTimerId) clearInterval(logTimerId);
                        logTimerId = setInterval(() => {
                            const start = parseInt(last_div.dataset.logStart);
                            const durationEl = last_div.querySelector('.log-duration');
                            if (durationEl) {
                                durationEl.innerText = `(${((Date.now() - start) / 1000).toFixed(1)}s)`;
                            }
                        }, 100);
                    }
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
                else if (data.type === 'stream_start') { 
                    currentAssistantMsg = null; currentRawContent = ""; last_div = null; setGenerating(true); 
                    if (logTimerId) { clearInterval(logTimerId); logTimerId = null; }
                } 
                else if (data.type === 'stream_end') { 
                    currentAssistantMsg = null; currentRawContent = ""; setGenerating(false); 
                    if (logTimerId) { clearInterval(logTimerId); logTimerId = null; }
                    // 移除所有日志容器中的 spinner
                    document.querySelectorAll('.log-status').forEach(s => s.innerHTML = '');
                } 
                else if (data.type === 'stream_chunk') {
                    if (logTimerId) { clearInterval(logTimerId); logTimerId = null; }
                    if (!currentAssistantMsg) { 
                        const wrapper = document.createElement('div');
                        wrapper.className = 'message-container';
                        currentAssistantMsg = createMessageElement('assistant'); 
                        wrapper.appendChild(currentAssistantMsg);
                        chatHistory.appendChild(wrapper); 
                    }
                    currentRawContent += data.content; 
                    currentAssistantMsg.querySelector('.content').innerHTML = marked.parse(currentRawContent);
                    lucide.createIcons(); // 实时扫描并生成新出现的图标
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                } 
                else if (data.type === 'stream_image') {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'message-container';
                    const el = createMessageElement('assistant');
                    el.querySelector('.role-tag').innerText = 'SCREEN CAPTURE';
                    const img = document.createElement('img'); img.className = 'captured-image'; img.src = `data:image/jpeg;base64,${data.data}`;
                    img.onclick = () => openLightbox(img.src); 
                    el.querySelector('.content').appendChild(img);
                    wrapper.appendChild(el);
                    chatHistory.appendChild(wrapper); chatHistory.scrollTop = chatHistory.scrollHeight;
                } else if (data.type === 'thinking_chunk') {
                    if (!currentAssistantMsg) { 
                        const wrapper = document.createElement('div');
                        wrapper.className = 'message-container';
                        currentAssistantMsg = createMessageElement('assistant'); 
                        wrapper.appendChild(currentAssistantMsg);
                        chatHistory.appendChild(wrapper); 
                    }
                    let t = currentAssistantMsg.querySelector('.thought-block');
                    if (!t) { t = document.createElement('div'); t.className = 'thought-block'; currentAssistantMsg.insertBefore(t, currentAssistantMsg.querySelector('.content')); }
                    t.textContent += data.content; chatHistory.scrollTop = chatHistory.scrollHeight;
                } 
                else if (data.type === 'script_output') {
                    const consoleEl = document.getElementById(`console_${data.scriptId}`);
                    if (consoleEl) {
                        const outputEl = consoleEl.querySelector('.console-output');
                        const line = document.createElement('div');
                        if (data.isError) line.style.color = '#ef4444';
                        line.textContent = data.content;
                        outputEl.appendChild(line);
                        consoleEl.scrollTop = consoleEl.scrollHeight;
                    }
                }
                else if (data.type === 'script_end') {
                    resetRunBtn(data.scriptId);
                    const consoleEl = document.getElementById(`console_${data.scriptId}`);
                    if (consoleEl) {
                        const outputEl = consoleEl.querySelector('.console-output');
                        const endLine = document.createElement('div');
                        endLine.style.color = '#64748b';
                        endLine.style.borderTop = '1px solid #1e293b';
                        endLine.style.marginTop = '5px';
                        endLine.style.paddingTop = '5px';
                        endLine.textContent = `Process exited with code ${data.exitCode}`;
                        outputEl.appendChild(endLine);
                        consoleEl.scrollTop = consoleEl.scrollHeight;
                    }
                }
                else if (data.role === 'user') { currentAssistantMsg = null; currentRawContent = ""; appendMessage(data); }
            };
        }

        function createMessageElement(role) {
            const div = document.createElement('div'); div.className = `message role-${role}`;
            const displayRole = role === 'assistant' ? 'CrisisAgent' : role;
            div.innerHTML = `<div class="role-tag">${displayRole}</div><div class="content"></div>`;
            return div;
        }

        let pendingFileBase64 = null;
        let pendingFileName = "";
        let pendingFileType = "";
        let pendingFileRaw = null; // 存储原始 File 对象用于流式传输
        let isGenerating = false;

        function setGenerating(status) {
            isGenerating = status;
            const btn = document.getElementById('send-btn');
            if (!btn) return;
            if (status) { btn.innerText = 'Stop'; btn.classList.add('stop'); }
            else { btn.innerText = 'Send'; btn.classList.remove('stop'); }
        }

        function getFileIcon(file) {
            const name = file.name.toLowerCase();
            const type = file.type.toLowerCase();
            
            if (type.includes('pdf')) return { icon: 'file-text', color: 'var(--file-pdf)' };
            if (type.includes('word') || name.endsWith('.doc') || name.endsWith('.docx')) return { icon: 'file-text', color: 'var(--file-doc)' };
            if (type.includes('excel') || type.includes('spreadsheet') || name.endsWith('.xls') || name.endsWith('.xlsx') || name.endsWith('.csv')) return { icon: 'file-spreadsheet', color: 'var(--file-xls)' };
            if (type.includes('presentation') || name.endsWith('.ppt') || name.endsWith('.pptx')) return { icon: 'presentation', color: 'var(--file-ppt)' };
            if (type.includes('zip') || type.includes('rar') || type.includes('archive') || name.endsWith('.7z') || name.endsWith('.tar') || name.endsWith('.gz')) return { icon: 'file-archive', color: 'var(--file-zip)' };
            if (type.includes('audio') || name.endsWith('.mp3') || name.endsWith('.wav') || name.endsWith('.ogg')) return { icon: 'music', color: 'var(--file-media)' };
            if (type.includes('video') || name.endsWith('.mp4') || name.endsWith('.mkv') || name.endsWith('.avi')) return { icon: 'video', color: 'var(--file-media)' };
            if (type.includes('javascript') || type.includes('typescript') || type.includes('json') || type.includes('html') || type.includes('css') || 
                name.endsWith('.js') || name.endsWith('.ts') || name.endsWith('.py') || name.endsWith('.cpp') || name.endsWith('.java') || name.endsWith('.go') || name.endsWith('.rs')) return { icon: 'file-code', color: 'var(--file-code)' };
            return { icon: 'file', color: 'var(--file-default)' };
        }

        function handleFile(inputOrFile) {
            const file = inputOrFile instanceof File ? inputOrFile : inputOrFile.files[0];
            if (!file) return;
            pendingFileRaw = file; 
            pendingFileName = file.name; 
            pendingFileType = file.type;
            pendingFileBase64 = null; 

            const previewImg = document.getElementById('image-preview');
            const fileIcon = document.getElementById('file-icon');
            const fileMeta = document.getElementById('file-meta');
            const progressContainer = document.getElementById('upload-progress-container');
            const progressBar = document.getElementById('upload-progress-bar');

            progressContainer.style.display = 'none';
            progressBar.style.width = '0%';

            if (file.type.startsWith('image/')) { 
                if (previewImg.src && previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
                previewImg.src = URL.createObjectURL(file); 
                previewImg.style.display = 'block'; 
                fileIcon.style.display = 'none'; 
            }
            else { 
                previewImg.style.display = 'none'; 
                fileIcon.style.display = 'flex';
                const { icon, color } = getFileIcon(file);
                fileIcon.innerHTML = `<i data-lucide="${icon}" style="color: ${color}"></i>`;
                lucide.createIcons();
            }
            fileMeta.innerText = `${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
            document.getElementById('image-preview-container').style.display = 'flex';

            // Only read as Base64 for small files (for chat context)
            if (file.size < 20 * 1024 * 1024) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pendingFileBase64 = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        }

        function clearFile() {
            const previewImg = document.getElementById('image-preview');
            if (previewImg.src && previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
            
            pendingFileBase64 = null; pendingFileName = ""; pendingFileType = ""; pendingFileRaw = null;
            document.getElementById('file-input').value = '';
            document.getElementById('image-preview-container').style.display = 'none';
            const pushBtn = document.getElementById('push-btn');
            pushBtn.innerText = 'Push to Server';
            pushBtn.disabled = false;
            pushBtn.style.borderColor = 'var(--border)';
            pushBtn.style.color = 'var(--accent-main)';
        }

        function pushFileToServer() {
            if (!pendingFileRaw) return;
            const btn = document.getElementById('push-btn');
            const progressContainer = document.getElementById('upload-progress-container');
            const progressBar = document.getElementById('upload-progress-bar');
            
            const originalText = btn.innerText;
            btn.innerText = 'Pushing...';
            btn.disabled = true;
            progressContainer.style.display = 'block';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload_binary', true);
            xhr.setRequestHeader('X-File-Name', encodeURIComponent(pendingFileName));
            xhr.setRequestHeader('Content-Type', 'application/octet-stream');

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                    btn.innerText = `Pushing ${Math.round(percent)}%`;
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    btn.innerText = 'Saved!';
                    btn.style.borderColor = 'var(--file-xls)';
                    btn.style.color = 'var(--file-xls)';
                    
                    // 关闭附件栏
                    setTimeout(() => {
                        document.getElementById('attachment-bar').classList.remove('active');
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                        pendingFileRaw = null;
                        pendingFileName = '';
                        btn.innerText = 'Push to Server';
                        btn.style.borderColor = 'var(--cyan)';
                        btn.style.color = 'var(--cyan)';
                    }, 1000);
                } else {
                    btn.innerText = 'Error';
                    btn.style.borderColor = 'var(--file-pdf)';
                    btn.style.color = 'var(--file-pdf)';
                }
            };

            xhr.onerror = () => {
                btn.innerText = 'Network Error';
                btn.style.borderColor = 'var(--file-pdf)';
                btn.style.color = 'var(--file-pdf)';
            };

            xhr.send(pendingFileRaw);
        }

        function appendMessage(msg) {
            if (!msg.content && !msg.tool_calls && (!msg.images || msg.images.length === 0) && (!msg.files || msg.files.length === 0)) return; 
            const wrapper = document.createElement('div');
            wrapper.className = 'message-container';
            const el = createMessageElement(msg.role);
            const content = msg.content || (msg.tool_calls ? '[Action Triggered]' : '');
            if (msg.images && msg.images.length > 0) {
                msg.images.forEach(imgData => {
                    const img = document.createElement('img'); img.className = 'captured-image'; img.src = `data:image/jpeg;base64,${imgData}`;
                    img.onclick = () => openLightbox(img.src); el.querySelector('.content').appendChild(img);
                });
            }
            if (msg.files && msg.files.length > 0) {
                msg.files.forEach(f => {
                    const fDiv = document.createElement('div');
                    fDiv.style.cssText = "background: rgba(100,116,139,0.1); border: 1px solid var(--accent-main); padding: 8px; border-radius: 0; font-family: monospace; font-size: 0.8rem; margin: 5px 0; color: var(--accent-main);";
                    fDiv.innerText = `📎 Attached File: ${f.name}`;
                    el.querySelector('.content').appendChild(fDiv);
                });
            }
            const textDiv = document.createElement('div');
            if (msg.role === 'assistant') { textDiv.innerHTML = marked.parse(content); }
            else if (msg.role === 'tool') { textDiv.textContent = `[Tool Result]: ${content}`; }
            else { textDiv.textContent = content; }
            el.querySelector('.content').appendChild(textDiv);
            wrapper.appendChild(el);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function send() {
            if (isGenerating) { socket.send(JSON.stringify({ type: 'stop' })); setGenerating(false); return; }
            const text = promptInput.value.trim();
            if (!text && !pendingFileBase64) return;
            if (text === '/reboot') showRebootOverlay();
            setGenerating(true);
            currentAssistantMsg = null; currentRawContent = "";
            const userMsg = { role: 'user', content: text };
            const payload = { type: 'chat', content: text, images: [], files: [] };
            if (pendingFileBase64) {
                if (pendingFileType.startsWith('image/')) { 
                    const imgObj = { name: pendingFileName, data: pendingFileBase64, type: pendingFileType };
                    userMsg.images = [pendingFileBase64]; 
                    payload.images = [imgObj]; 
                } else { 
                    const fileObj = { name: pendingFileName, data: pendingFileBase64, type: pendingFileType };
                    userMsg.files = [fileObj]; payload.files = [fileObj]; 
                }
            }
            appendMessage(userMsg);
            socket.send(JSON.stringify(payload));
            promptInput.value = ''; clearFile(); suggestionsBox.style.display = 'none';
        }

        function sendCommand(cmd) { 
            if (cmd === '/reboot') showRebootOverlay();
            currentAssistantMsg = null; currentRawContent = ""; setGenerating(true); 
            socket.send(JSON.stringify({ type: 'chat', content: cmd, images: [], files: [] })); 
        }

        async function runJSCode(scriptId) {
            const codeEl = document.getElementById(`code_${scriptId}`);
            const consoleEl = document.getElementById(`console_${scriptId}`);
            const outputEl = consoleEl.querySelector('.console-output');
            const runBtn = document.getElementById(`run_${scriptId}`);
            const foldBtn = document.getElementById(`fold_${scriptId}`);
            
            const code = codeEl.innerText;
            outputEl.innerHTML = '';
            consoleEl.classList.add('active');
            consoleEl.classList.remove('error');
            outputEl.classList.remove('folded');
            foldBtn.innerText = '▼';
            
            runBtn.innerText = 'Stop';
            runBtn.classList.add('stop');
            runBtn.onclick = () => stopJSCode(scriptId);

            try {
                const res = await fetch('/api/run_script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, scriptId })
                });
                const data = await res.json();
                if (!data.success) {
                    outputEl.innerText = `Error starting script: ${data.error}`;
                    consoleEl.classList.add('error');
                    resetRunBtn(scriptId);
                }
            } catch (e) {
                outputEl.innerText = `Connection error: ${e.message}`;
                consoleEl.classList.add('error');
                resetRunBtn(scriptId);
            }
        }

        async function stopJSCode(scriptId) {
            try {
                await fetch('/api/stop_script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scriptId })
                });
            } catch (e) { console.error('Stop error:', e); }
            resetRunBtn(scriptId);
        }

        function resetRunBtn(scriptId) {
            const runBtn = document.getElementById(`run_${scriptId}`);
            if (runBtn) {
                runBtn.innerText = 'Run';
                runBtn.classList.remove('stop');
                runBtn.onclick = () => runJSCode(scriptId);
            }
        }

        function toggleJSConsole(scriptId) {
            const consoleEl = document.getElementById(`console_${scriptId}`);
            const outputEl = consoleEl.querySelector('.console-output');
            const foldBtn = document.getElementById(`fold_${scriptId}`);
            const isFolded = outputEl.classList.toggle('folded');
            foldBtn.innerText = isFolded ? '▶' : '▼';
        }

        let dragCounter = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault(); dragCounter++;
            const dz = document.getElementById('drop-zone');
            if (dz) dz.classList.add('active');
        });
        window.addEventListener('dragover', (e) => {
            e.preventDefault(); e.dataTransfer.dropEffect = 'copy';
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault(); dragCounter--;
            const dz = document.getElementById('drop-zone');
            if (dz && dragCounter <= 0) { dragCounter = 0; dz.classList.remove('active'); }
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault(); dragCounter = 0;
            const dz = document.getElementById('drop-zone');
            if (dz) dz.classList.remove('active');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) { handleFile(e.dataTransfer.files[0]); }
        });

        connect();
        document.getElementById('send-btn').onclick = send;
    </script>
</body>
</html>
